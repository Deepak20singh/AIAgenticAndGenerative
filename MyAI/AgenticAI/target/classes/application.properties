spring.application.name=AgenticAI
# ---- DataSource ----
spring.datasource.url=jdbc:mysql://localhost:3306/agenticdb
spring.datasource.username=root
spring.datasource.password=1234

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# (Optional) sirf agar explicitly dena ho:
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Server (optional) ----
server.port=8080


ai.provider.base-url=http://localhost:1234/v1
ai.provider.api-key=
ai.provider.model=Meta-Llama-3-8B-Instruct  # LM Studio me jo model host kiya ho uska naam

# Embeddings: all-minilm-l6-v2 used automatically (in-process ONNX)
